<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cổng Thông Tin Nội Bộ | Antigravity</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="data.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #312e81 100%);
            color: #f8fafc;
            min-height: 100vh;
        }
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
        }
        .glass-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }
        .glass-nav {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .search-input {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
        }
        .search-input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }
        .search-input:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.5);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
        }
        .tab-btn {
            transition: all 0.3s ease;
        }
        .tab-btn.active {
            background: rgba(255, 255, 255, 0.15);
            border-bottom: 2px solid #818cf8;
            color: white;
        }
        .tab-btn:not(.active) {
            color: rgba(255, 255, 255, 0.6);
        }
        .tab-btn:hover:not(.active) {
            color: white;
            background: rgba(255, 255, 255, 0.05);
        }
        
        /* Modal */
        .modal {
            display: none;
        }
        .modal.active {
            display: flex;
        }
    </style>
</head>
<body class="antialiased relative overflow-x-hidden">
    <!-- Decorative background elements -->
    <div class="fixed top-0 left-0 w-full h-full overflow-hidden -z-10 pointer-events-none">
        <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] rounded-full bg-indigo-600 blur-[120px] opacity-30"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] rounded-full bg-purple-600 blur-[150px] opacity-20"></div>
        <div class="absolute top-[40%] left-[60%] w-[30%] h-[30%] rounded-full bg-blue-500 blur-[100px] opacity-20"></div>
    </div>

    <!-- Navigation -->
    <nav class="glass-nav sticky top-0 z-40 w-full">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center shadow-lg shadow-indigo-500/30">
                        <i class="fa-solid fa-atom text-white text-xl"></i>
                    </div>
                    <span class="font-bold text-xl tracking-wide bg-clip-text text-transparent bg-gradient-to-r from-indigo-200 to-purple-200">
                        Antigravity Portal
                    </span>
                </div>
                <div class="hidden md:block">
                    <div class="ml-10 flex items-baseline space-x-4">
                        <button onclick="switchTab('docs')" id="tab-docs" class="tab-btn active px-4 py-2 rounded-t-lg text-sm font-semibold flex items-center gap-2">
                            <i class="fa-solid fa-folder-open"></i> Kho Tài Liệu
                        </button>
                        <button onclick="switchTab('contacts')" id="tab-contacts" class="tab-btn px-4 py-2 rounded-t-lg text-sm font-semibold flex items-center gap-2">
                            <i class="fa-solid fa-address-book"></i> Danh Bạ Nhân Sự
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8" style="min-height: calc(100vh - 64px);">
        
        <!-- Header & Search -->
        <div class="mb-8 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
            <div>
                <h1 id="page-title" class="text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-white to-gray-400">
                    Kho Tài Liệu Nội Bộ
                </h1>
                <p id="page-subtitle" class="text-gray-400 mt-1 text-sm">
                    Tra cứu quy chế, văn bản, biểu mẫu hiện hành của công ty.
                </p>
            </div>
            
            <div class="relative w-full md:w-96 group">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                    <i class="fa-solid fa-magnifying-glass text-gray-400 group-focus-within:text-indigo-400 transition-colors"></i>
                </div>
                <input type="text" id="searchInput" onkeyup="handleSearch()" 
                    class="search-input w-full pl-10 pr-3 py-2.5 rounded-xl transition duration-300" 
                    placeholder="Tìm kiếm tài liệu...">
                <div class="absolute inset-y-0 right-0 pr-3 flex items-center">
                    <span class="text-xs text-gray-500 font-mono">/</span>
                </div>
            </div>
        </div>

        <!-- Render Container -->
        <div id="content-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Content will be injected here by JS -->
        </div>
        
        <!-- Empty State (Hidden by default) -->
        <div id="empty-state" class="hidden flex-col items-center justify-center py-20 text-gray-400">
            <i class="fa-regular fa-folder-open text-6xl mb-4 opacity-50"></i>
            <h3 class="text-xl font-medium text-white mb-2">Không tìm thấy dữ liệu</h3>
            <p>Không có kết quả nào khớp với từ khóa tìm kiếm của bạn.</p>
        </div>

    </main>

    <!-- Document Modal -->
    <div id="docModal" class="modal fixed inset-0 z-50 items-center justify-center p-4 bg-black/60 backdrop-blur-sm">
        <div class="glass w-full max-w-4xl max-h-[90vh] rounded-2xl flex flex-col shadow-2xl overflow-hidden transform transition-all duration-300 scale-95 opacity-0" id="modalContent">
            <div class="flex justify-between items-center p-6 border-b border-white/10 bg-white/5">
                <h2 id="modalTitle" class="text-2xl font-bold text-white flex gap-3 items-center">
                    <i class="fa-solid fa-file-contract text-indigo-400"></i>
                    <span>Tên tài liệu</span>
                </h2>
                <button onclick="closeModal()" class="text-gray-400 hover:text-white transition-colors p-2 rounded-lg hover:bg-white/10">
                    <i class="fa-solid fa-xmark text-xl"></i>
                </button>
            </div>
            <div class="p-6 overflow-y-auto custom-scrollbar flex-1 bg-black/20">
                <div id="modalBody" class="text-gray-200 leading-relaxed whitespace-pre-wrap font-mono text-sm">
                    Nội dung tài liệu...
                </div>
            </div>
            <div class="p-4 border-t border-white/10 bg-white/5 flex justify-end">
                <button onclick="closeModal()" class="px-6 py-2 rounded-lg bg-indigo-600 hover:bg-indigo-500 text-white font-medium transition-colors shadow-lg shadow-indigo-500/30">
                    Đóng
                </button>
            </div>
        </div>
    </div>

    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.3); }
    </style>

    <script>
        let currentTab = 'docs'; // 'docs' or 'contacts'
        
        // Ensure portalData is loaded
        document.addEventListener("DOMContentLoaded", () => {
            if (typeof portalData === 'undefined') {
                document.getElementById('content-container').innerHTML = `
                    <div class="col-span-full text-center py-10 bg-red-500/20 text-red-200 rounded-xl border border-red-500/30">
                        <i class="fa-solid fa-triangle-exclamation text-3xl mb-3"></i>
                        <p>Lỗi: Không tìm thấy file data.js. Vui lòng chạy tool xuất dữ liệu trước.</p>
                    </div>`;
                return;
            }
            renderData();
        });

        function switchTab(tab) {
            currentTab = tab;
            
            // Update UI
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`tab-${tab}`).classList.add('active');
            
            // Update Header
            if (tab === 'docs') {
                document.getElementById('page-title').innerText = 'Kho Tài Liệu Nội Bộ';
                document.getElementById('page-subtitle').innerText = 'Tra cứu quy chế, văn bản, biểu mẫu hiện hành của công ty.';
                document.getElementById('searchInput').placeholder = 'Tìm kiếm tài liệu...';
            } else {
                document.getElementById('page-title').innerText = 'Danh Bạ Nhân Sự';
                document.getElementById('page-subtitle').innerText = 'Thông tin liên lạc của các thành viên trong công ty.';
                document.getElementById('searchInput').placeholder = 'Tìm kiếm tên, phòng ban...';
            }
            
            // Clear search
            document.getElementById('searchInput').value = '';
            
            renderData();
        }

        function renderData(searchQuery = '') {
            const container = document.getElementById('content-container');
            const emptyState = document.getElementById('empty-state');
            container.innerHTML = '';
            
            const query = searchQuery.toLowerCase();
            let hasResults = false;

            if (currentTab === 'docs') {
                const docs = portalData.documents || [];
                docs.forEach(doc => {
                    if (doc.title.toLowerCase().includes(query) || doc.preview.toLowerCase().includes(query)) {
                        hasResults = true;
                        container.innerHTML += \`
                            <div class="glass-card rounded-2xl p-6 flex flex-col h-full cursor-pointer group" onclick="openDoc('\${doc.id}')">
                                <div class="w-12 h-12 rounded-xl bg-indigo-500/20 text-indigo-300 flex items-center justify-center mb-4 group-hover:scale-110 transition-transform">
                                    <i class="fa-solid fa-file-lines text-xl"></i>
                                </div>
                                <h3 class="text-lg font-bold text-white mb-2 line-clamp-1">\${doc.title}</h3>
                                <p class="text-sm text-gray-400 flex-1 line-clamp-3 mb-4">\${doc.preview}</p>
                                <div class="mt-auto pt-4 border-t border-white/10 flex justify-between items-center text-xs text-indigo-300 font-medium">
                                    <span>Đọc chi tiết</span>
                                    <i class="fa-solid fa-arrow-right group-hover:translate-x-1 transition-transform"></i>
                                </div>
                            </div>
                        \`;
                    }
                });
            } else {
                const contacts = portalData.contacts || [];
                contacts.forEach(contact => {
                    if (contact.Ho_Ten.toLowerCase().includes(query) || 
                        contact.Phong_Ban.toLowerCase().includes(query) ||
                        contact.Chuc_Vu.toLowerCase().includes(query) ||
                        contact.Email.toLowerCase().includes(query)) {
                        
                        hasResults = true;
                        
                        // Generate Avatar Initials
                        const initials = contact.Ho_Ten.split(' ').map(n=>n[0]).slice(-2).join('').toUpperCase();
                        
                        container.innerHTML += \`
                            <div class="glass-card rounded-2xl p-6 flex flex-col h-full relative overflow-hidden">
                                <div class="absolute top-0 right-0 w-24 h-24 bg-purple-500/10 rounded-bl-full -z-10"></div>
                                <div class="flex items-start gap-4 mb-5">
                                    <div class="w-14 h-14 rounded-full bg-gradient-to-br from-indigo-400 to-purple-500 flex items-center justify-center text-white font-bold text-lg shadow-lg">
                                        \${initials}
                                    </div>
                                    <div class="flex-1 min-w-0">
                                        <h3 class="text-lg font-bold text-white truncate">\${contact.Ho_Ten}</h3>
                                        <div class="inline-block mt-1 px-2.5 py-1 rounded-full bg-white/10 text-xs text-indigo-200 font-medium whitespace-nowrap">
                                            \${contact.Phong_Ban}
                                        </div>
                                    </div>
                                </div>
                                <div class="space-y-3 mt-auto">
                                    <div class="flex items-center gap-3 text-sm text-gray-300">
                                        <i class="fa-solid fa-briefcase text-gray-400 w-4"></i>
                                        <span class="truncate">\${contact.Chuc_Vu}</span>
                                    </div>
                                    <div class="flex items-center gap-3 text-sm text-gray-300">
                                        <i class="fa-solid fa-envelope text-gray-400 w-4"></i>
                                        <a href="mailto:\${contact.Email}" class="hover:text-indigo-300 transition-colors truncate">\${contact.Email}</a>
                                    </div>
                                    <div class="flex items-center gap-3 text-sm text-gray-300">
                                        <i class="fa-solid fa-phone text-gray-400 w-4"></i>
                                        <a href="tel:\${contact.So_Dien_Thoai}" class="hover:text-indigo-300 transition-colors">\${contact.So_Dien_Thoai}</a>
                                    </div>
                                </div>
                            </div>
                        \`;
                    }
                });
            }

            // Toggle empty state
            if (hasResults) {
                container.classList.remove('hidden');
                emptyState.classList.add('hidden');
                emptyState.classList.remove('flex');
            } else {
                container.classList.add('hidden');
                emptyState.classList.remove('hidden');
                emptyState.classList.add('flex');
            }
        }

        function handleSearch() {
            const query = document.getElementById('searchInput').value;
            renderData(query);
        }

        // Modal Logic
        function openDoc(id) {
            const doc = portalData.documents.find(d => d.id === id);
            if (!doc) return;
            
            document.getElementById('modalTitle').innerHTML = \`<i class="fa-solid fa-file-contract text-indigo-400"></i> <span>\${doc.title}</span>\`;
            document.getElementById('modalBody').innerText = doc.content;
            
            const modal = document.getElementById('docModal');
            const modalContent = document.getElementById('modalContent');
            
            modal.classList.add('active');
            // Small trigger delay for animation
            setTimeout(() => {
                modalContent.classList.remove('scale-95', 'opacity-0');
                modalContent.classList.add('scale-100', 'opacity-100');
            }, 10);
            
            // Prevent body scroll
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            const modal = document.getElementById('docModal');
            const modalContent = document.getElementById('modalContent');
            
            modalContent.classList.remove('scale-100', 'opacity-100');
            modalContent.classList.add('scale-95', 'opacity-0');
            
            setTimeout(() => {
                modal.classList.remove('active');
                document.body.style.overflow = '';
            }, 300);
        }

        // Close modal on click outside
        document.getElementById('docModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });
        
        // Listen to keyboard shortcut (Slash to focus search)
        document.addEventListener('keydown', (e) => {
            if (e.key === '/' && document.activeElement.tagName !== 'INPUT') {
                e.preventDefault();
                document.getElementById('searchInput').focus();
            }
            if (e.key === 'Escape') {
                const modal = document.getElementById('docModal');
                if (modal.classList.contains('active')) closeModal();
            }
        });
    </script>
</body>
</html>
